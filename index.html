<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teachable Machine Classifier</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --surface-2: #eef2f7;
        --text: #0f172a;
        --muted: #475569;
        --accent: #2563eb;
        --border: rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
          radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.1), transparent 35%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 24px;
      }

      .app {
        max-width: 980px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .subtitle {
        margin: 0 0 24px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
      }

      .card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        backdrop-filter: blur(8px);
        box-shadow: 0 16px 35px rgba(15, 23, 42, 0.08);
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
      }

      button,
      input[type="file"]::file-selector-button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent);
        color: #ffffff;
      }

      button.secondary {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      input[type="file"] {
        width: 100%;
        color: var(--muted);
      }

      .stage {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 220px;
        background: rgba(238, 242, 247, 0.8);
        border: 1px dashed rgba(15, 23, 42, 0.18);
        border-radius: 14px;
        overflow: hidden;
      }

      .stage canvas,
      .stage img {
        max-width: 100%;
        border-radius: 14px;
      }

      .status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      #label-container div {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        margin-top: 10px;
        border-radius: 12px;
        background: rgba(238, 242, 247, 0.95);
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Teachable Machine Image Model</h1>
      <p class="subtitle">Use either your webcam or an uploaded image to classify with the same model.</p>

      <div class="grid">
        <!--
        <section class="card">
          <h2>Webcam</h2>
          <div class="controls">
            <button type="button" onclick="initWebcam()">Start Webcam</button>
            <button type="button" class="secondary" onclick="stopWebcam()">Stop Webcam</button>
          </div>
          <div class="stage" id="webcam-container"></div>
          <div class="status" id="webcam-status">Webcam is idle.</div>
        </section>
        -->

        <section class="card">
          <h2>Upload Image</h2>
          <input id="file-input" type="file" accept="image/*" />
          <div style="height: 12px"></div>
          <div class="stage">
            <img id="upload-preview" alt="Uploaded preview" style="display: none" />
          </div>
          <div class="status" id="upload-status">Choose an image to classify.</div>
        </section>

        <section class="card" style="grid-column: 1 / -1">
          <h2>Predictions</h2>
          <div id="label-container"></div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
      const MODEL_URL = "./my_model/";

      let model;
      let webcam;
      let labelContainer;
      let maxPredictions = 0;
      let isWebcamRunning = false;
      let animationFrameId = null;

      async function loadModel() {
        if (model) return model;

        const modelURL = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
          const row = document.createElement("div");
          row.innerHTML = `<span>Class ${i + 1}</span><span>0.00</span>`;
          labelContainer.appendChild(row);
        }

        return model;
      }

      async function initWebcam() {
        await loadModel();

        if (isWebcamRunning) return;

        const flip = true;
        webcam = new tmImage.Webcam(200, 200, flip);
        await webcam.setup();
        await webcam.play();

        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = "";
        webcamContainer.appendChild(webcam.canvas);

        document.getElementById("webcam-status").textContent =
          "Webcam is running. Classification updates continuously.";

        isWebcamRunning = true;
        animationFrameId = window.requestAnimationFrame(loop);
      }

      async function loop() {
        if (!isWebcamRunning || !webcam) return;

        webcam.update();
        await predict(webcam.canvas);
        animationFrameId = window.requestAnimationFrame(loop);
      }

      async function predict(inputElement) {
        await loadModel();

        const prediction = await model.predict(inputElement);

        for (let i = 0; i < maxPredictions; i++) {
          const row = labelContainer.childNodes[i];
          if (!row) continue;

          row.innerHTML = `<span>${prediction[i].className}</span><span>${prediction[
            i
          ].probability.toFixed(2)}</span>`;
        }
      }

      async function handleUpload(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        await loadModel();

        const preview = document.getElementById("upload-preview");
        const uploadStatus = document.getElementById("upload-status");
        const imageUrl = URL.createObjectURL(file);

        preview.onload = async () => {
          uploadStatus.textContent = `Classifying ${file.name}...`;
          await predict(preview);
          uploadStatus.textContent = `Finished classifying ${file.name}.`;
          URL.revokeObjectURL(imageUrl);
        };

        preview.src = imageUrl;
        preview.style.display = "block";
      }

      async function stopWebcam() {
        isWebcamRunning = false;

        if (animationFrameId) {
          window.cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }

        if (webcam) {
          webcam.stop();
        }

        document.getElementById("webcam-status").textContent = "Webcam stopped.";
      }

      document.getElementById("file-input").addEventListener("change", handleUpload);
    </script>
  </body>
</html>
